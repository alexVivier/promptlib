<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient: indigo to violet -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="55%" stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <!-- Top highlight sheen -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.22"/>
      <stop offset="60%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Shadow for inner elements -->
    <filter id="softShadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#312E81" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background squircle -->
  <rect width="1024" height="1024" rx="228" fill="url(#bgGrad)"/>

  <!-- Subtle sheen overlay (top half) -->
  <clipPath id="squircleClip">
    <rect width="1024" height="1024" rx="228"/>
  </clipPath>
  <rect width="1024" height="560" clip-path="url(#squircleClip)" fill="url(#sheen)"/>

  <!-- Document page (behind, slightly offset = stacked library feel) -->
  <rect x="302" y="188" width="440" height="560" rx="36" fill="white" opacity="0.12"/>

  <!-- Main document page -->
  <rect x="280" y="210" width="440" height="560" rx="36" fill="white" opacity="0.93" filter="url(#softShadow)"/>

  <!-- Prompt chevron ">" -->
  <path d="M365 400 L480 500 L365 600"
        fill="none" stroke="#4F46E5" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Cursor line -->
  <rect x="520" y="418" width="40" height="164" rx="20" fill="#8B5CF6" opacity="0.6"/>

  <!-- Text lines (representing saved prompts) -->
  <rect x="600" y="440" width="72" height="14" rx="7" fill="#4F46E5" opacity="0.18"/>
  <rect x="600" y="500" width="56" height="14" rx="7" fill="#4F46E5" opacity="0.13"/>
  <rect x="600" y="560" width="64" height="14" rx="7" fill="#4F46E5" opacity="0.10"/>

  <!-- Top title bar accent on document -->
  <rect x="340" y="275" width="100" height="12" rx="6" fill="#4F46E5" opacity="0.22"/>
  <rect x="340" y="305" width="160" height="10" rx="5" fill="#4F46E5" opacity="0.10"/>

  <!-- Small decorative dots (library/collection hint) -->
  <circle cx="658" cy="340" r="8" fill="#8B5CF6" opacity="0.18"/>
  <circle cx="688" cy="340" r="8" fill="#8B5CF6" opacity="0.13"/>
  <circle cx="718" cy="340" r="8" fill="#8B5CF6" opacity="0.09"/>
</svg>
